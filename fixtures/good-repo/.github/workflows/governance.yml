# The blueprint pipeline from the paper, assembled out of proven parts.
# Scores 8/8 against the maturity rubric.
name: API Governance
on:
  pull_request:
    paths:
      - 'openapi.yaml'
      - '.config/spectral/**'
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - '.config/spectral/**'
jobs:
  design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tooling pinned to a full 40-char commit SHA — not @latest.
      - name: Spectral design lint
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eabb1adba33f4a1
        with:
          # Custom ruleset that lives in a dedicated, owned home.
          spectral_ruleset: .config/spectral/ruleset.yaml
          file_glob: 'openapi.yaml'
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A dedicated OWASP API security layer, failing on real errors, with a
      # machine-readable SARIF report uploaded to the security tab.
      - name: OWASP API security lint
        run: |
          npx -y @stoplight/spectral-cli@6.11.1 lint openapi.yaml \
            --ruleset .config/spectral/security.yaml \
            --fail-severity error \
            --format sarif --output spectral.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: spectral.sarif
      - name: Governance summary
        if: always()
        run: echo "Spectral governance gate complete" >> "$GITHUB_STEP_SUMMARY"
